# API 配置
api:`
  base-path: /api/v1

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

# 日志配置
logging:
  level:
    root: WARN
    com.moderation: DEBUG
    org.springframework.web: INFO
    org.mybatis: INFO
    org.h2: WARN
